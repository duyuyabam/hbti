name: Wipe Firestore data (manual)

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '삭제를 진행하려면 DELETE 입력'
        required: true
        default: ''

jobs:
  wipe:
    if: ${{ github.event.inputs.confirm == 'DELETE' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install firebase-admin
        run: npm install firebase-admin@12
      - name: Write service account key
        run: echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$RUNNER_TEMP/sa.json"
      - name: Wipe Firestore
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: node scripts/wipe-firestore.mjs
